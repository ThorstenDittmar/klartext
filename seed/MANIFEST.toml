disposition = "exclude"
note        = "seed-internal meta-doc (explains seed/baseline/ to a seed maintainer) — not consumer-bundle content. Per DevOps: a no-target as_is would ship at its path; exclude keeps it out cleanly."

# ── declared — prerequisites the importer provides (never shipped) ─────────────
[[entry]]
