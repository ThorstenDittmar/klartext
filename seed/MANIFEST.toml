# ── agent-team framework (baseline roles, authored generic — ship as_is) ───────
# Source is seed/baseline/ (NOT the live agents/, which is the source endeavour's real team = excluded
# Fachlichkeit). These are authored generic skeletons with placeholders → copied verbatim, consumer edits.
[[entry]]
path        = "seed/baseline/agents/team.yaml"
disposition = "as_is"
target      = "agents/team.yaml"
note        = "baseline roster: OE · DevOps · SA · QA · Product Owner (+ clone _domain-expert per domain)"

[[entry]]
path        = "seed/baseline/agents/{oe,devops,system-architect,qa,product-owner}/**"
disposition = "as_is"
target      = "agents/"
note        = "baseline-role triples (start.sh/allowed-tools.txt/claude.md), war-stories stripped (plan §6 decision 4). EN now; bilingual = flagged follow-up (decision 1)"

[[entry]]
path        = "seed/baseline/agents/_domain-expert/**"
disposition = "as_is"
target      = "agents/_domain-expert/"
note        = "the one cloneable Domain-Expert template — clone per consumer domain (plan §6 decision 3)"

[[entry]]
path        = "seed/baseline/l2/**"
disposition = "as_is"
target      = "docs/method/enactment/practices/"
note        = "L2 enactment skeleton (_skeleton.md) + one worked example (EXAMPLE-improvement-step.md), plan §6 decision 2"

[[entry]]
path        = "seed/baseline/README.md"
disposition = "exclude"
note        = "seed-internal meta-doc (explains seed/baseline/ to a seed maintainer) — not consumer-bundle content. Per DevOps: a no-target as_is would ship at its path; exclude keeps it out cleanly."

# ── declared — prerequisites the importer provides (never shipped) ─────────────
[[entry]]
path        = "superpowers"
disposition = "declared"
note        = "external plugin; see docs/method/library/resources/superpowers.md"

[[entry]]
path        = "essence-baseline"
disposition = "declared"
note        = "pinned meta-language; see docs/method/library/resources/essence.md"

[[entry]]
path        = "toolchain"
disposition = "declared"
note        = "Claude Code (app + hooks), git, gh, Python 3.x, a per-project memory dir"

# ── exclude — product Fachlichkeit & product CI (never travels) ────────────────
[[entry]]
path        = "api/**"
disposition = "exclude"
note        = "product backend (FastAPI)"

[[entry]]
path        = "frontend/**"
disposition = "exclude"
note        = "product frontend (React)"

[[entry]]
path        = "agents/{narrative,causal-model,audit,community}/**"
disposition = "exclude"
note        = "klartext domain agents — the ROLE template ships, these specific agents do not"

[[entry]]
path        = ".github/workflows/{integration,lint,qa,test,setup-smoke-test,deploy-docs}.yml"
disposition = "exclude"
note        = "product CI (Supabase / product stack lint+test / docs deploy)"
