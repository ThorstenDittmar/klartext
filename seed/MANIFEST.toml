# Seed Manifest — klartext's worked instance.
#
# The authoritative inventory of the method seed and the keystone the assembly step reads
# (manifest-driven assembly, model B: as_is files are pulled from the live repo, not stored as copies).
# See docs/method/library/seed-manifest.md for the disposition taxonomy and the completeness rule.
#
# disposition ∈ { as_is | template | config_source | generated | declared | exclude }
#   as_is        → copy verbatim from the live `path`
#   template     → render from seed.toml to `target`
#   config_source→ the consumer fills it; everything else reads from it
#   generated    → produced by the assembly step
#   declared     → prerequisite the importer provides; never shipped, never vendored
#   exclude      → product Fachlichkeit; never travels (listed so the boundary is explicit)
#
# NOTE markers "REVIEW (DevOps)" flag entries whose as_is-vs-template disposition is a DevOps mechanism
# call (the file carries klartext literals — see the literal counts). OE proposes; DevOps confirms when it
# builds the assembly step. This is the manifest doing its completeness-audit job, not a finished call.

# ── config source ──────────────────────────────────────────────────────────
[[entry]]
path        = "seed/seed.toml"
disposition = "config_source"
note        = "the keystone; the consumer fills it, every template reads from it"

# ── assembly mechanism ───────────────────────────────────────────────────────
[[entry]]
path        = "seed/render.py"
disposition = "as_is"
note        = "the render/assembly mechanism (reads seed.toml + this manifest)"

[[entry]]
path        = "seed/MANIFEST.toml"
disposition = "as_is"
note        = "this file — the inventory the assembly step iterates"

# ── templates (rendered from seed.toml) ──────────────────────────────────────
[[entry]]
path        = "seed/templates/claude-settings.json.tmpl"
disposition = "template"
target      = ".claude/settings.json"

[[entry]]
path        = "seed/templates/pre-commit-config.yaml.tmpl"
disposition = "template"
target      = ".pre-commit-config.yaml"

[[entry]]
path        = "seed/templates/bin-seed-python.tmpl"
disposition = "template"
target      = "bin/python-shim"
note        = "portable interpreter shim (rendered from seed.toml `interpreter`)"

# ── L3 method library (ships as-is — generic, the method itself) ──────────────
[[entry]]
path        = "docs/method/library/**"
disposition = "as_is"
target      = "docs/method/library/"
note        = "the whole L3 library: practices, patterns, resources, semat-definition, adr-mechanism, standards-charter, seed-manifest, dependency-contract, alpha-states, glossary, _card-template"

# ── generic WoW gates (workflows, 0 klartext literals — verbatim) ─────────────
[[entry]]
path        = ".github/workflows/agent-provenance.yml"
disposition = "as_is"

[[entry]]
path        = ".github/workflows/classify-gate.yml"
disposition = "as_is"
note        = "config-driven (reads wow_trigger_paths from seed.toml, #185)"

[[entry]]
path        = ".github/workflows/method-classification.yml"
disposition = "as_is"

# ── WoW machinery scripts (0 literals — verbatim) ─────────────────────────────
[[entry]]
path        = "scripts/ci_scope.py"
disposition = "as_is"

[[entry]]
path        = "scripts/substrate_restore.py"
disposition = "as_is"

[[entry]]
path        = "scripts/agent_trailer.py"
disposition = "as_is"
note        = "DevOps confirmed ships verbatim (the 1 literal is incidental)"

[[entry]]
path        = "scripts/classify_gate.py"
disposition = "as_is"
note        = "B-voll DONE (#197): the live gate now sources TRIGGER_PATTERNS from seed.toml (no hardcoded klartext paths) → ships as_is, reads the consumer's config. (Was deferred pending B-voll.)"

[[entry]]
path        = "scripts/method_classification.py"
disposition = "as_is"
note        = "REVIEW (DevOps): ships verbatim ONLY AFTER removing the dead docs/superpowers/improvement/** legacy check (post-F0)"

