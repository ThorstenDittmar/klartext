[[entry]]
path        = "scripts/com.klartext.compact-monitor.plist.template"
disposition = "deferred"
note        = "macOS launch agent. In-scope but not yet shippable: the klartext literal is in the FILENAME (com.klartext.compact-monitor.plist) + the Label, so it needs target-PATH parametrization (assemble renders content, not target paths) + EN comments. Tracked as the next template increment; assemble reports it as a known gap so the bundle stays source-literal-clean."

# ── agent-team framework (baseline roles, authored generic — ship as_is) ───────
# Source is seed/baseline/ (NOT the live agents/, which is the source endeavour's real team = excluded
# Fachlichkeit). These are authored generic skeletons with placeholders → copied verbatim, consumer edits.
[[entry]]
path        = "seed/baseline/agents/team.yaml"
disposition = "as_is"
target      = "agents/team.yaml"
note        = "baseline roster: OE · DevOps · SA · QA · Product Owner (+ clone _domain-expert per domain)"

[[entry]]
path        = "seed/baseline/agents/{oe,devops,system-architect,qa,product-owner}/**"
disposition = "as_is"
target      = "agents/"
note        = "baseline-role triples (start.sh/allowed-tools.txt/claude.md), war-stories stripped (plan §6 decision 4). EN now; bilingual = flagged follow-up (decision 1)"

[[entry]]
path        = "seed/baseline/agents/_domain-expert/**"
disposition = "as_is"
target      = "agents/_domain-expert/"
note        = "the one cloneable Domain-Expert template — clone per consumer domain (plan §6 decision 3)"

[[entry]]
path        = "seed/baseline/l2/**"
disposition = "as_is"
target      = "docs/method/enactment/practices/"
note        = "L2 enactment skeleton (_skeleton.md) + one worked example (EXAMPLE-improvement-step.md), plan §6 decision 2"

[[entry]]
