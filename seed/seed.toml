# Method-seed config source (export plan §4). Every endeavour-specific literal lives here; every
# templated artefact renders from it. An importer adapts THIS file — not a global find-replace.
# These are klartext's own values, serving as the worked example a consumer overwrites.

project_name      = "klartext"                         # the slug everywhere
env_prefix        = "KLARTEXT_"                         # env-var prefix
memory_dir        = "klartext-team-memory"             # ~/.claude/<memory_dir>/ (memory + inbox)
product_domain    = "klartext.jetzt"                   # help strings
repo_slug         = "ThorstenDittmar/klartext"         # gh / CI
worktree_base     = "$HOME/klartext-worktrees"         # launcher
identity_preamble = "the klartext multi-agent system"  # load_agent_identity.py
interpreter       = "api/.venv/bin/python3"            # portable interpreter (§7, phase 2)
cli_entrypoint    = "api/cli.py"                       # consumer's product CLI the gate watches (SA §9)
wow_cli_command   = "klartext"                          # how the consumer invokes the WoW CLI (`<cmd> converge`)

# Way-of-Working trigger surfaces for the classification gate (SA §9). These are the GENERIC paths
# whose change is a rolling-vs-breaking question. NOTE the convention these encode: `scripts/` holds
# WoW machinery only — product code lives in the product stack, never under scripts/, or it would
# falsely trip the gate. The product CLI is parametrized separately (cli_entrypoint), not listed here.
wow_trigger_paths = [
    "CLAUDE.md",
    "docs/method/**",
    "agents/**/claude.md",
    ".claude/settings.json",
    ".github/workflows/**",
    "scripts/**",
]

# Coverage-Invariant 1 config (read at runtime by scripts/check_test_coverage.py — QA verdict, plan
# §6). source_dirs are the source layers under backend_dir; excluded_files have no domain logic;
# test_file_overrides are "source.py=test_file.py" strings for non-default test names. These are
# klartext's own values, the worked example a consumer overwrites for its stack.
backend_dir       = "api"
tests_dir         = "api/tests"
source_dirs       = ["models", "services", "repositories", "routers"]
excluded_files    = [
    "__init__.py",
    "dependencies.py",
    "main.py",
    "cli.py",
    "seeddata.py",
    "user_repository.py",
    "_supabase.py",
    "supabase_causal_model_repository.py",
    "supabase_claim_repository.py",
    "supabase_narrative_repository.py",
    "supabase_narrative_unit_repository.py",
    "supabase_user_repository.py",
    "health_service.py",
]
test_file_overrides = ["causal_models.py=test_causal_model_router.py"]
