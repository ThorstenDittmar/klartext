# Team Roster — Work Product advancing the Team alpha (see method.md, Work Products).
# Owner: OE. Maintenance ritual: updated in the SAME step as the event that changes it
# (onboarding, offboarding, migration app->terminal). Stores ONLY non-derivable facts:
#   - who exists        -> derivable from agents/*/ directories (NOT duplicated here)
#   - worktree present  -> derivable from `git worktree list` (NOT duplicated here)
#   - status            -> app | terminal  (migration state during the staggered rollout)
#   - active            -> false = offboarded/paused (kept for history, not started)
#   - display           -> tab label for tooling (morning script)
# Consumers: scripts/start-agent.sh tooling, scripts/morning.sh (DevOps mechanics).

