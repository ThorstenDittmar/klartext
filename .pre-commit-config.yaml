# Pre-commit hooks — run automatically before every git commit.
# Install once after cloning: pre-commit install  (handled by setup.sh)
# Run manually on all files: pre-commit run --all-files

repos:
  # ---------------------------------------------------------------------------
  # Python: ruff (lint + format)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  # ---------------------------------------------------------------------------
  # Python: mypy (type checking)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --strict, --python-version=3.12]
        files: ^api/(?!tests/).*\.py$
        additional_dependencies:
          - fastapi>=0.115.0
          - pydantic>=2.8.0
          - anthropic>=0.40.0
          - supabase>=2.0.0
          - httpx>=0.27.0
          - typer>=0.12.0

  # ---------------------------------------------------------------------------
  # Python: tach (layer boundary enforcement)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: tach-check
        name: tach (layer boundaries)
        entry: api/.venv/bin/tach
        language: system
        args: [check]
        pass_filenames: false
        types: [python]

  # ---------------------------------------------------------------------------
  # Frontend: ESLint + TypeScript
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: tsc
        name: tsc typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Architectural linting: semgrep (custom rules in .semgrep/rules/)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (architectural rules)
        entry: api/.venv/bin/semgrep
        language: system
        args: [scan, --config=.semgrep/rules/, --error, --metrics=off]
        pass_filenames: false
        types_or: [python, ts, tsx]
