name: QA

# Runs structural test coverage checks and QA-specific Semgrep rules.
# Complements lint.yml (which runs existing Semgrep rules) with QA-specific invariants.

on:
  # push only on main; PRs validated via pull_request. Avoids the duplicate
  # push+pull_request check runs on the same SHA that blocked #118.
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  qa:
    name: QA Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # #1a coarse scoping: skip QA only for a pure method/environment PR (neither api nor
      # frontend touched). The job still runs and reports success, so this required check is
      # never "skipped".
      - id: scope
        uses: ./.github/actions/ci-scope

      - uses: actions/setup-python@v6
        if: steps.scope.outputs.api != 'false' || steps.scope.outputs.frontend != 'false'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        if: steps.scope.outputs.api != 'false' || steps.scope.outputs.frontend != 'false'
        run: pip install -e '.[dev]'
        working-directory: api

      - name: Structural test coverage check
        if: steps.scope.outputs.api != 'false' || steps.scope.outputs.frontend != 'false'
        # Checks three invariants:
        # 1. Every source file has a test file
        # 2. Every router test has a health test
        # 3. Every Supabase repository test has @pytest.mark.integration
        run: python scripts/check_test_coverage.py

      - name: Semgrep QA rules
        if: steps.scope.outputs.api != 'false' || steps.scope.outputs.frontend != 'false'
        # Runs only the QA-specific Semgrep rules (fake constants + router try/except).
        # The full Semgrep rule set (including existing rules) runs in lint.yml.
        run: |
          semgrep scan \
            --config=.semgrep/rules/klartext-fake-silent-constant.yaml \
            --config=.semgrep/rules/klartext-router-no-try-except.yaml \
            --error \
            --metrics=off \
            api/
        working-directory: ${{ github.workspace }}
