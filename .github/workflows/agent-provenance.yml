name: Agent Provenance

# ADR-0014: every commit records which agent authored it via an `Agent: <slug>` trailer
# (slug = the agents/<name>/ directory name, the SSOT; spawn-aware as `Agent: <lead> (spawned <task>)`;
# genuine non-agent commits use the explicit `Agent: human` bypass). The commit-msg hook adds/validates
# it locally; this gate rejects any PR commit whose message lacks a well-formed trailer, so git history
# stays self-describing. Decision in scripts/agent_trailer.py (unit-tested in
# api/tests/infrastructure/test_agent_trailer.py); this workflow only iterates the PR's commits.
#
# Intentionally NOT path-filtered: the job always runs and reports a status (required-check-safe).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-trailer:
    name: Agent trailer (ADR-0014)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need the full base..head range to read every commit message

      - name: Validate the Agent trailer on every PR commit
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          python3 - <<'PY'
          import subprocess, sys
          sys.path.insert(0, "scripts")
          import agent_trailer as at
          from pathlib import Path

          slugs = at.valid_agent_slugs(Path("."))
          base = subprocess.run(
              ["git", "rev-parse", f"origin/{__import__('os').environ['BASE_REF']}"],
              capture_output=True, text=True, check=True).stdout.strip()
          shas = subprocess.run(
              ["git", "log", "--format=%H", f"{base}..HEAD"],
              capture_output=True, text=True, check=True).stdout.split()

          failures = []
          for sha in shas:
              msg = subprocess.run(
                  ["git", "log", "-1", "--format=%B", sha],
                  capture_output=True, text=True, check=True).stdout
              v = at.trailer_violation(msg, slugs)
              if v:
                  subject = msg.splitlines()[0] if msg.strip() else "(empty)"
                  failures.append(f"  {sha[:9]}  {subject}\n      -> {v}")

          if failures:
              print("✗  commits missing a well-formed ADR-0014 Agent trailer:")
              print("\n".join(failures))
              sys.exit(1)
          print(f"✓  all {len(shas)} PR commit(s) carry a well-formed Agent trailer.")
          PY
