name: Setup Smoke Test

# Verifies that setup.sh works on a completely fresh environment —
# the same starting point a new developer or a Codespace would have.

on:
  # push only on main; PRs validated via pull_request. Without the branch filter
  # a PR touching these paths fires both events on the same SHA (duplicate runs).
  push:
    branches: [main]
    paths:
      - "setup.sh"
      - "api/pyproject.toml"
      - "frontend/package*.json"
      - ".github/workflows/setup-smoke-test.yml"
  pull_request:
    paths:
      - "setup.sh"
      - "api/pyproject.toml"
      - "frontend/package*.json"
      - ".github/workflows/setup-smoke-test.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke-test:
    name: Fresh environment bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify Supabase CLI is NOT pre-installed
        run: "! command -v supabase"

      - name: Run setup.sh
        # Skip supabase start — this job only verifies the install and dependency setup.
        # A running Supabase instance is not needed here; integration tests (integration.yml)
        # cover that path with a real local Supabase instance.
        env:
          SKIP_SUPABASE_START: "true"
        run: bash setup.sh

      - name: Verify klartext CLI is available
        run: api/.venv/bin/klartext --help

      - name: Verify pre-commit is installed
        run: api/.venv/bin/pre-commit --version

      - name: Verify git hooks are active
        run: test -f .git/hooks/pre-commit

      - name: Verify unit tests pass
        run: |
          cd api
          .venv/bin/python -m pytest tests/ -m "not integration" -q
