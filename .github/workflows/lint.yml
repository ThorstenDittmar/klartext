name: Lint

on:
  # push only on main; PRs validated via pull_request. Avoids the duplicate
  # push+pull_request check runs on the same SHA that blocked #118.
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-api:
    name: API Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v6

      # #1a coarse scoping: skip the API steps when a PR touches no API/shared paths.
      # The job still runs and reports success, so this required check is never "skipped".
      - id: scope
        uses: ./.github/actions/ci-scope

      - uses: actions/setup-python@v6
        if: steps.scope.outputs.api != 'false'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        if: steps.scope.outputs.api != 'false'
        run: pip install -e '.[dev]'

      - name: ruff check
        if: steps.scope.outputs.api != 'false'
        run: ruff check .

      - name: ruff format check
        if: steps.scope.outputs.api != 'false'
        run: ruff format --check .

      - name: mypy
        if: steps.scope.outputs.api != 'false'
        run: mypy api/ --ignore-missing-imports
        working-directory: ${{ github.workspace }}

      - name: tach (layer boundaries)
        if: steps.scope.outputs.api != 'false'
        run: tach check
        working-directory: ${{ github.workspace }}

  lint-frontend:
    name: Frontend Lint + Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      # #1a coarse scoping: skip the frontend steps when a PR touches no frontend/shared paths.
      - id: scope
        uses: ./.github/actions/ci-scope

      - uses: actions/setup-node@v6
        if: steps.scope.outputs.frontend != 'false'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.scope.outputs.frontend != 'false'
        run: npm ci

      - name: ESLint
        if: steps.scope.outputs.frontend != 'false'
        run: npm run lint

      - name: TypeScript typecheck
        if: steps.scope.outputs.frontend != 'false'
        run: npm run typecheck
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: placeholder-for-ci
